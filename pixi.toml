[workspace]
name = "drone-racing-semantic-localization"
version = "0.1.0"
description = "Project umbrella for dual pose-graph semantic localization for vision-based autonomous drone racing at the A2RL (Abu Dhabi Autonomous Racing League) Season 1 competition: experiments, evaluation and reproducibility."
authors = [
  "David Perez-Saura <david.perez.saura@upm.es>",
  "Miguel Fernandez-Cortizas <miguel.fernandez.cortizas@upm.es>",
  "Alvaro J. Gaona <alvgaona@gmail.com>",
  "Pascual Campoy <pascual.campoy@upm.es>",
]
channels = [
  "conda-forge",
  "robostack-humble",
  "https://prefix.dev/aerostack2",
  "https://prefix.dev/dual-pose-graph",
]
platforms = ["osx-arm64"]

[dependencies]
# Experiment / evaluation tooling used by scripts/.
numpy = "*"
scipy = "*"
pandas = "*"
matplotlib = "*"
pyyaml = "*"
opencv = "*"
py-opencv = "*"
tqdm = "*"
evo = "*"

[feature.humble]
channels = [
  "robostack-humble",
  "https://prefix.dev/aerostack2",
  "https://prefix.dev/dual-pose-graph",
]

[feature.humble.dependencies]
# ROS 2 runtime to replay bags and run the SLAM node.
ros-humble-ros2cli = "*"
ros-humble-ros2launch = "*"
ros-humble-ros2bag = "*"
ros-humble-rosbag2 = "*"
ros-humble-rosbag2-storage-mcap = "*"
ros-humble-rviz2 = "*"
# SemanticSlam ROS 2 node; pulls the dual_pose_graph library transitively.
# NOTE: resolves only once ros-humble-dual-pose-graph is published to the channel.
ros-humble-dual-pose-graph = ">=0.1"

[feature.humble.tasks]
# Full experiment pipeline: SLAM node (+ RViz) replaying a bag. Append launch args,
# e.g. `pixi run experiment bag:=/path/to/rosbag use_sim_time:=true`.
experiment = "ros2 launch launch/experiment.launch.py"

[environments]
default = { features = ["humble"], solve-group = "default" }
